<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
</head>

<body class="bg-[#121212] text-gray-200 min-h-screen flex items-center justify-center font-sans relative">

    <div class="flex items-center gap-6 relative">

        <div class="flex flex-col gap-3">
            <button id="openModalBtn"
                class="w-10 h-10 rounded-full bg-[#1e1e1e] border border-gray-800 hover:bg-gray-800 flex items-center justify-center text-gray-400 hover:text-white transition duration-200 shadow-lg">
                <span class="material-icons text-xl">add</span>
            </button>
            <button
                disabled class="disabled:pointer-events-none disabled:opacity-50 prev-card w-10 h-10 rounded-full bg-[#1e1e1e] border border-gray-800 hover:bg-gray-800 flex items-center justify-center text-gray-400 hover:text-white transition duration-200 shadow-lg">
                <span class="material-icons text-xl">arrow_upward</span>
            </button>
            <button
                disabled class="disabled:pointer-events-none disabled:opacity-50 next-card w-10 h-10 rounded-full bg-[#1e1e1e] border border-gray-800 hover:bg-gray-800 flex items-center justify-center text-gray-400 hover:text-white transition duration-200 shadow-lg">
                <span class="material-icons text-xl">arrow_downward</span>
            </button>
        </div>

        <div
            class="single-card group relative w-[380px] bg-[#222224] rounded-3xl p-6 shadow-2xl border border-gray-800 flex flex-col gap-5 z-10">

            <div
                class="absolute top-4 right-4 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity duration-200 z-20">
                <button id="editCardBtn"
                    class="disabled:pointer-events-none disabled:opacity-50 bg-[#323236] text-gray-300 hover:text-white p-2 rounded-full border border-gray-700 hover:bg-gray-700 transition cursor-pointer"
                    title="Edit" disabled>
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                        stroke="currentColor" class="w-4 h-4">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L6.832 19.82a4.5 4.5 0 0 1-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 0 1 1.13-1.897L16.863 4.487Zm0 0L19.5 7.125" />
                    </svg>
                </button>
                <button id="deleteCardBtn"
                    class="disabled:pointer-events-none disabled:opacity-50 bg-[#323236] text-red-400 hover:text-red-500 p-2 rounded-full border border-gray-700 hover:bg-gray-700 transition cursor-pointer"
                    title="Delete" disabled>
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                        stroke="currentColor" class="w-4 h-4">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
                    </svg>
                </button>
            </div>

            <div
                class="w-14 h-14 rounded-full overflow-hidden border-2 border-transparent group-[.important-card]:border-[#f97316] group-[.urgent-card]:border-[#a855f7] group-[.norush-card]:border-[#10b981]">
                <img src="https://zafarplastic.com/wp-content/uploads/2024/02/zpceo.jpg" alt="Avatar"
                    class="user-image-ui w-full h-full object-cover">
            </div>

            <div class="flex flex-col gap-4">
                <div>
                    <h2 class="user-name-ui text-2xl font-bold text-white tracking-wide">No Data</h2>
                    <div class="flex justify-between items-center text-sm mt-2">
                        <span class="text-gray-400">Home town</span>
                        <span class="home-town text-gray-200 font-medium">No Data</span>
                    </div>
                </div>

                <div class="bg-[#1e1e20] p-3 rounded-2xl border border-gray-800/60">
                    <span class="text-xs font-semibold text-gray-500 block mb-1 tracking-wide uppercase">Appointment Note</span>
                    <p class="note-ui text-gray-300 text-sm leading-relaxed line-clamp-3" title="Full note content here">
                        No Data
                    </p>
                </div>
            </div>

            <div class="flex gap-3 mt-1">
                <button
                    class="flex-1 bg-white text-black font-semibold py-2.5 px-4 rounded-full flex items-center justify-center gap-2 hover:bg-gray-200 transition duration-200 shadow-md">
                    <span class="material-icons text-sm">phone</span> Call
                </button>
                <button
                    class="flex-1 bg-[#323236] text-white font-semibold py-2.5 px-4 rounded-full hover:bg-gray-700 transition duration-200 border border-gray-700">
                    Message
                </button>
            </div>

        </div>

        <div id="deleteConfirmModal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm justify-center items-center z-50">
            <div
                class="bg-[#222224] border border-gray-800 p-6 rounded-3xl w-[340px] flex flex-col gap-4 shadow-2xl text-center">
                <h3 class="text-white text-xl font-bold">Are you sure?</h3>
                <p class="text-gray-400 text-sm">Do you really want to delete this contact note? This process cannot be undone.
                </p>
                <div class="flex gap-3 mt-2">
                    <button id="cancelDeleteBtn"
                        class="flex-1 bg-[#323236] text-white py-2.5 rounded-full hover:bg-gray-700 transition font-semibold text-sm cursor-pointer border border-gray-700">Cancel</button>
                    <button id="confirmDeleteBtn"
                        class="flex-1 bg-red-500 text-white py-2.5 rounded-full hover:bg-red-600 transition font-semibold text-sm cursor-pointer">Delete</button>
                </div>
            </div>
        </div>

        <div id="editFormModal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm justify-center items-center z-50">
            <div class="bg-[#222224] border border-gray-800 p-6 rounded-3xl w-[380px] flex flex-col gap-4 shadow-2xl">

                <div class="flex justify-between items-center mb-1">
                    <h3 class="text-white text-xl font-bold">Edit Contact Note</h3>
                    <button id="closeEditModalBtn"
                        class="text-gray-400 hover:text-white transition cursor-pointer">&times;</button>
                </div>

                <div id="editErrorMsg"
                    class="hidden text-center bg-red-500/10 border border-red-500/20 text-red-400 text-xs font-medium py-2 px-3 rounded-xl tracking-wide">
                    Please fill out the input field!!
                </div>

                <div class="flex flex-col gap-3">
                    <div>
                        <input type="text" id="editImgInput" placeholder="Image URL" data-maxchar="250"
                            class="w-full bg-[#1e1e20] border border-gray-800 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-purple-500">
                    </div>

                    <div>
                        <input type="text" id="editNameInput" placeholder="User Name" data-maxchar="20"
                            class="w-full bg-[#1e1e20] border border-gray-800 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-purple-500">
                        <div class="text-[11px] text-gray-500 text-right mt-1 px-1">
                            <span id="editNameCounter">0</span>/<span class="max-char-num">20</span>
                        </div>
                    </div>

                    <div>
                        <input type="text" id="editAddressInput" placeholder="Address" data-maxchar="30"
                            class="w-full bg-[#1e1e20] border border-gray-800 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-purple-500">
                        <div class="text-[11px] text-gray-500 text-right mt-1 px-1">
                            <span id="editAddressCounter">0</span>/<span class="max-char-num">30</span>
                        </div>
                    </div>

                    <div>
                        <textarea id="editNoteInput" rows="3" placeholder="Appointment Note" data-maxchar="100"
                            class="w-full bg-[#1e1e20] border border-gray-800 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-purple-500 resize-none"></textarea>
                        <div class="text-[11px] text-gray-500 text-right mt-1 px-1">
                            <span id="editNoteCounter">0</span>/<span class="max-char-num">100</span>
                        </div>
                    </div>
                </div>

                <span class="text-xs font-semibold text-gray-500 block tracking-wide">Select
                    Category</span>
                <div class="flex justify-between items-center px-1">
                    <label
                        class="flex items-center gap-2 px-3 py-1.5 rounded-full border border-purple-500/30 bg-purple-500/5 text-purple-400 text-xs font-medium cursor-pointer hover:bg-purple-500/10 transition target-label">
                        <input type="radio" name="editCategory" class="edit-category-rad accent-[#a855f7]" data-editcategory="urgent">
                        Urgent
                    </label>
                    <label
                        class="flex items-center gap-2 px-3 py-1.5 rounded-full border border-orange-500/30 bg-orange-500/5 text-orange-400 text-xs font-medium cursor-pointer hover:bg-orange-500/10 transition target-label">
                        <input type="radio" name="editCategory" class="edit-category-rad accent-[#f97316]"
                            data-editcategory="important">
                        Important
                    </label>
                    <label
                        class="flex items-center gap-2 px-3 py-1.5 rounded-full border border-gray-500/30 bg-gray-500/5 text-gray-400 text-xs font-medium cursor-pointer hover:bg-gray-500/10 transition target-label">
                        <input type="radio" name="editCategory" class="edit-category-rad accent-[#10b981]" data-editcategory="norush">
                        No Rush
                    </label>
                </div>

                <div class="flex gap-3">
                    <button id="saveEditBtn"
                        class="w-full bg-white text-black font-semibold py-2.5 rounded-full hover:bg-gray-200 transition text-sm cursor-pointer shadow-md">Save
                        Changes</button>
                </div>
            </div>
        </div>

        <div class="flex flex-col gap-3.5 pl-2">
            <span
                class="active-filter category-btn w-4 h-4 rounded-full bg-gray-500 border-2 border-[#121212] outline outline-1 outline-[#ffffff73] cursor-pointer scale-110 hover:scale-110 transition"
                title="All/Default" data-filter="all"></span>

            <span
                class="category-btn w-4 h-4 rounded-full bg-[#a855f7] border-2 border-transparent outline outline-1 outline-transparent cursor-pointer hover:scale-110 transition"
                title="Urgent" data-filter="urgent"></span>

            <span
                class="category-btn w-4 h-4 rounded-full bg-[#f97316] border-2 border-transparent outline outline-1 outline-transparent cursor-pointer hover:scale-110 transition"
                title="Important" data-filter="important"></span>

            <span
                class="category-btn w-4 h-4 rounded-full bg-[#10b981] border-2 border-transparent outline outline-1 outline-transparent cursor-pointer hover:scale-110 transition"
                title="No Rush" data-filter="norush"></span>
        </div>

    </div>

    <div id="formModal"
        class="fixed inset-0 bg-black/70 backdrop-blur-sm hidden items-center justify-center z-50 transition-all duration-300 overflow-y-auto p-4">
        <div
            class="w-full max-w-[420px] w-[420px] bg-[#1e1e20] border border-gray-800 rounded-3xl p-6 shadow-2xl transform scale-95 transition-transform duration-300">

            <div class="flex justify-between items-center mb-5">
                <h3 class="text-xl font-bold text-white">New Call</h3>
                <button id="closeModalBtn" type="button"
                    class="text-gray-400 hover:text-white transition cursor-pointer">
                    &times;
                </button>
            </div>

            <div id="errorMsg"
                class="hidden text-center bg-red-500/10 border border-red-500/20 text-red-400 text-xs font-medium py-2 px-3 rounded-xl tracking-wide mb-3">
            </div>

            <form class="flex flex-col gap-4">
                <div class="flex flex-col gap-1.5">
                    <label class="text-xs font-semibold text-gray-400 tracking-wider">Image URL</label>
                    <input type="text" id="imgInput" placeholder="https://example.com/photo.jpg"
                        class="image-url w-full bg-[#2c2c2e] border border-gray-800 rounded-xl px-4 py-3 text-sm text-gray-200 focus:outline-none focus:border-gray-600 transition">
                </div>

                <div class="flex flex-col gap-1.5">
                    <label class="text-xs font-semibold text-gray-400 tracking-wider">Full Name</label>
                    <input data-maxchar="20" type="text" id="nameInput" placeholder="Enter full name"
                        class="user-name w-full bg-[#2c2c2e] border border-gray-800 rounded-xl px-4 py-3 text-sm text-gray-200 focus:outline-none focus:border-gray-600 transition">
                    <div class="text-right text-[11px] text-gray-500 mt-0.5">
                        <span id="nameCounter" class="font-medium">0</span> / 20
                    </div>
                </div>

                <div class="flex flex-col gap-1.5">
                    <label class="text-xs font-semibold text-gray-400 tracking-wider">Home Town</label>
                    <input data-maxchar="30" type="text" id="homeInput" placeholder="Enter home town"
                        class="user-address w-full bg-[#2c2c2e] border border-gray-800 rounded-xl px-4 py-3 text-sm text-gray-200 focus:outline-none focus:border-gray-600 transition">
                    <div class="text-right text-[11px] text-gray-500 mt-0.5">
                        <span id="homeCounter" class="font-medium">0</span> / 30
                    </div>
                </div>

                <div class="flex flex-col gap-1.5">
                    <label class="text-xs font-semibold text-gray-400 tracking-wider">Appointment Note</label>
                    <textarea data-maxchar="140" id="noteInput" rows="3" placeholder="Write your appointment note here (Max 140 characters)..."
                        class="w-full bg-[#2c2c2e] border border-gray-800 rounded-xl px-4 py-3 text-sm text-gray-200 focus:outline-none focus:border-gray-600 transition resize-none scrollbar-thin scrollbar-thumb-gray-700"></textarea>
                    <div class="text-right text-[11px] text-gray-500 mt-0.5">
                        <span id="noteCounter" class="font-medium">0</span> / 140
                    </div>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="text-xs font-semibold text-gray-400 tracking-wider">Category</label>
                    <div class="flex flex-wrap gap-2">

                        <label
                            class="flex items-center gap-2 px-3 py-1.5 rounded-full border border-purple-500/30 bg-purple-500/5 text-purple-400 text-xs font-medium cursor-pointer hover:bg-purple-500/10 transition target-label">
                            <input type="radio" name="priorityCategory" value="urgent" data-category="urgent"
                                class="category-rad accent-[#a855f7] w-3.5 h-3.5 border-gray-750 text-purple-500 bg-transparent focus:ring-0 focus:ring-offset-0">
                            Urgent
                        </label>

                        <label
                            class="flex items-center gap-2 px-3 py-1.5 rounded-full border border-orange-500/30 bg-orange-500/5 text-orange-400 text-xs font-medium cursor-pointer hover:bg-orange-500/10 transition target-label">
                            <input type="radio" name="priorityCategory" value="important" data-category="important"
                                class="category-rad accent-[#f97316] w-3.5 h-3.5 border-gray-750 text-orange-500 bg-transparent focus:ring-0 focus:ring-offset-0">
                            Important
                        </label>

                        <label
                            class="flex items-center gap-2 px-3 py-1.5 rounded-full border border-gray-700 bg-[#2c2c2e] text-gray-400 text-xs font-medium cursor-pointer hover:bg-gray-800 transition target-label">
                            <input type="radio" name="priorityCategory" value="no-rush" data-category="norush"
                                class="category-rad accent-[#10b981] w-3.5 h-3.5 border-gray-750 text-gray-400 bg-transparent focus:ring-0 focus:ring-offset-0">
                            No Rush
                        </label>

                    </div>
                </div>

                <button type="button"
                    class="create-note w-full bg-white text-black font-bold py-3 rounded-full hover:bg-gray-200 transition duration-200 shadow-md">
                    Create Note
                </button>
            </form>

        </div>
    </div>

    <script src="main.js"></script>
</body>

</html>
